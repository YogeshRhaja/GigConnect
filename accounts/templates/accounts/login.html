<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login – FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>

<body style="background-color:#f4f6f8;">

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card border-0 shadow-sm p-4" style="width:400px; border-radius:14px;">

        <!-- Brand -->
        <div class="text-center mb-4">
            <div style="width:48px;height:48px;background:#185FA5;border-radius:12px;
                        display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;">
                <i class="fa-solid fa-briefcase" style="color:#fff;font-size:20px;"></i>
            </div>
            <h2 class="fw-semibold mb-0" style="font-size:1.4rem;">Welcome back</h2>
            <p class="text-muted" style="font-size:0.875rem;">Sign in to your FreelanceHub account</p>
        </div>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
                    <i class="fa-solid {% if message.tags == 'danger' %}fa-circle-xmark{% elif message.tags == 'success' %}fa-circle-check{% else %}fa-circle-info{% endif %}"></i>
                    {{ message }}
                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% if error %}
            <div class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2">
                <i class="fa-solid fa-circle-xmark"></i>
                {{ error }}
                <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
            </div>
        {% endif %}

        <!-- Form -->
        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-medium" style="font-size:0.875rem;">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-user text-muted" style="font-size:13px;"></i>
                    </span>
                    <input type="text" name="username" class="form-control border-start-0"
                           placeholder="Enter your username" required>
                </div>
            </div>

            <div class="mb-1">
                <label class="form-label fw-medium" style="font-size:0.875rem;">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-lock text-muted" style="font-size:13px;"></i>
                    </span>
                    <input type="password" name="password" id="passwordInput"
                           class="form-control border-start-0 border-end-0"
                           placeholder="Enter your password" required>
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="togglePassword()" tabindex="-1"
                            style="border-left:0;">
                        <i class="fa-solid fa-eye" id="eyeIcon" style="font-size:13px;"></i>
                    </button>
                </div>
            </div>

            <!-- Forgot password link -->
            <div class="text-end mb-4">
                <a href="{% url 'accounts:password_reset' %}"
                   class="text-decoration-none text-muted"
                   style="font-size:0.8rem;">
                    Forgot password?
                </a>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-medium" style="padding:10px;border-radius:8px;">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign in
            </button>
        </form>

        <p class="text-center mt-3 mb-0 text-muted" style="font-size:0.875rem;">
            New user?
            <a href="{% url 'accounts:signup' %}" class="text-decoration-none fw-medium">Create account</a>
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon  = document.getElementById('eyeIcon');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.classList.toggle('fa-eye',      !show);
    icon.classList.toggle('fa-eye-slash', show);
}
</script>
</body>
</html>
