<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password – FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>

<body style="background-color:#f4f6f8;">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card border-0 shadow-sm p-4" style="width:400px;border-radius:14px;">

        <div class="text-center mb-4">
            <div style="width:48px;height:48px;background:#185FA5;border-radius:12px;
                        display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;">
                <i class="fa-solid fa-key" style="color:#fff;font-size:20px;"></i>
            </div>
            <h2 class="fw-semibold mb-1" style="font-size:1.3rem;">Forgot your password?</h2>
            <p class="text-muted" style="font-size:0.875rem;">
                Enter your email and we'll send you a reset link.
            </p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex align-items-center gap-2">
                    <i class="fa-solid fa-circle-info"></i>
                    {{ message }}
                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-medium" style="font-size:0.875rem;">Email address</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-envelope text-muted" style="font-size:13px;"></i>
                    </span>
                    <input type="email" name="email" class="form-control border-start-0"
                           placeholder="you@example.com" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-medium" style="padding:10px;border-radius:8px;">
                <i class="fa-solid fa-paper-plane me-2"></i>Send reset link
            </button>
        </form>

        <p class="text-center mt-3 mb-0" style="font-size:0.875rem;">
            <a href="{% url 'accounts:login' %}" class="text-decoration-none text-muted">
                <i class="fa-solid fa-arrow-left me-1"></i>Back to login
            </a>
        </p>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
