<!DOCTYPE html>
<html lang="en">
<head>
    <title>Set New Password – FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>

<body style="background-color:#f4f6f8;">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card border-0 shadow-sm p-4" style="width:400px;border-radius:14px;">

        <div class="text-center mb-4">
            <div style="width:48px;height:48px;background:#185FA5;border-radius:12px;
                        display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;">
                <i class="fa-solid fa-lock-open" style="color:#fff;font-size:20px;"></i>
            </div>
            <h2 class="fw-semibold mb-1" style="font-size:1.3rem;">Set new password</h2>
            <p class="text-muted" style="font-size:0.875rem;">Must be at least 8 characters.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex align-items-center gap-2">
                    <i class="fa-solid fa-circle-info"></i>{{ message }}
                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-medium" style="font-size:0.875rem;">New password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-lock text-muted" style="font-size:13px;"></i>
                    </span>
                    <input type="password" name="new_password1" id="pw1"
                           class="form-control border-start-0 border-end-0"
                           placeholder="New password" required>
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="toggleField('pw1','eye1')" tabindex="-1" style="border-left:0;">
                        <i class="fa-solid fa-eye" id="eye1" style="font-size:13px;"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-medium" style="font-size:0.875rem;">Confirm password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-lock text-muted" style="font-size:13px;"></i>
                    </span>
                    <input type="password" name="new_password2" id="pw2"
                           class="form-control border-start-0 border-end-0"
                           placeholder="Confirm password" required>
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="toggleField('pw2','eye2')" tabindex="-1" style="border-left:0;">
                        <i class="fa-solid fa-eye" id="eye2" style="font-size:13px;"></i>
                    </button>
                </div>
                <div id="matchMsg" class="form-text"></div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-medium"
                    style="padding:10px;border-radius:8px;">
                <i class="fa-solid fa-check me-2"></i>Reset password
            </button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleField(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.classList.toggle('fa-eye',      !show);
    icon.classList.toggle('fa-eye-slash', show);
}

// Live password match check
const pw1 = document.getElementById('pw1');
const pw2 = document.getElementById('pw2');
const msg = document.getElementById('matchMsg');
const btn = document.getElementById('submitBtn');

function checkMatch() {
    if (!pw2.value) { msg.textContent = ''; return; }
    if (pw1.value === pw2.value) {
        msg.textContent = 'Passwords match';
        msg.style.color = '#3B6D11';
        btn.disabled = false;
    } else {
        msg.textContent = 'Passwords do not match';
        msg.style.color = '#A32D2D';
        btn.disabled = true;
    }
}
pw1.addEventListener('input', checkMatch);
pw2.addEventListener('input', checkMatch);
</script>
</body>
</html>
