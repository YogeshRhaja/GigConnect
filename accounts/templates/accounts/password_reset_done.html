<!DOCTYPE html>
<html lang="en">
<head>
    <title>Check your email – FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body style="background-color:#f4f6f8;">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card border-0 shadow-sm p-4 text-center" style="width:400px;border-radius:14px;">
        <div style="width:48px;height:48px;background:#EAF3DE;border-radius:12px;
                    display:inline-flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <i class="fa-solid fa-envelope-circle-check" style="color:#3B6D11;font-size:20px;"></i>
        </div>
        <h2 class="fw-semibold mb-2" style="font-size:1.3rem;">Check your inbox</h2>
        <p class="text-muted" style="font-size:0.875rem;">
            If an account exists for that email, a reset link is on its way.
            Check your spam folder if you don't see it.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary mt-2"
           style="border-radius:8px;">
            <i class="fa-solid fa-arrow-left me-2"></i>Back to login
        </a>
    </div>
</div>
</body>
</html>
