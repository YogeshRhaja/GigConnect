{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="card shadow-sm border-0">

                <div class="card-body p-4">

                    <h4 class="fw-bold text-center mb-4">
                        Edit Your Skills
                    </h4>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="skills" class="form-label fw-semibold">
                                Skills (comma separated)
                            </label>
                            <input
                                type="text"
                                class="form-control"
                                id="skills"
                                name="skills"
                                placeholder="Python, Django, React, AI"
                                value="{{ skills.skills|default:'' }}"
                            >
                            <small class="text-muted">
                                Example: Python, Machine Learning, Web Development
                            </small>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Save Skills
                        </button>
                    </form>

                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
